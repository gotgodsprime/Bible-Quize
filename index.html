<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Blitz: Word Scramble</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --card: #ffffff;
            --primary: #6366f1;
            --accent: #818cf8;
            --success: #10b981;
            --error: #ef4444;
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        .game-card {
            background: var(--card);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.15); color: var(--error); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        /* Timer UI */
        .timer-box {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
        }
        .timer-svg { transform: rotate(-90deg); width: 80px; height: 80px; }
        .timer-bg { fill: none; stroke: #e2e8f0; stroke-width: 6; }
        .timer-progress {
            fill: none;
            stroke: var(--primary);
            stroke-width: 6;
            stroke-linecap: round;
            stroke-dasharray: 226; /* 2 * PI * 36 */
            transition: stroke-dashoffset 1s linear, stroke 0.3s;
        }
        #timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: 800;
            font-size: 1.2rem;
        }
        .low-time #timer-text { animation: pulse 0.5s infinite; }

        /* Gameplay UI */
        .scrambled {
            font-size: 2.4rem;
            font-weight: 900;
            letter-spacing: 5px;
            color: var(--primary);
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            transition: 0.2s;
            background: #f8fafc;
        }
        input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

        .btn {
            width: 100%;
            padding: 16px;
            margin-top: 15px;
            border: none;
            border-radius: 15px;
            background: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-next { background: var(--text-main); }

        .score-tag {
            position: absolute;
            top: -15px;
            right: 20px;
            background: var(--primary);
            color: white;
            padding: 5px 15px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .feedback { margin-top: 15px; font-weight: 700; height: 20px; }
    </style>
</head>
<body>

    <div class="game-card" id="card">
        <div class="score-tag">SCORE: <span id="score">0</span></div>
        
        <div id="game-view">
            <div class="timer-box" id="timer-container">
                <svg class="timer-svg">
                    <circle class="timer-bg" cx="40" cy="40" r="36"></circle>
                    <circle id="progress" class="timer-progress" cx="40" cy="40" r="36"></circle>
                </svg>
                <div id="timer-text">15</div>
            </div>

            <div class="scrambled" id="display-word">----</div>
            <input type="text" id="input-box" placeholder="Type name..." autocomplete="off">
            <button class="btn" id="main-btn">Check Answer</button>
            <div class="feedback" id="msg"></div>
        </div>

        <div id="end-view" style="display: none;">
            <h1 style="font-size: 2rem;">Game Over!</h1>
            <p id="final-score" style="margin: 15px 0 25px; color: var(--text-sub);"></p>
            <button class="btn" onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <script>
        const names = ["Elizabeth", "Peter", "Abraham", "Elijah", "Lazarus", "Moses", "David", "Gideon", "Esther", "Samuel"];
        let current = 0, score = 0, timeLeft = 15, timer = null, isReadyForNext = false;
        let sessionWords = [];

        const card = document.getElementById('card');
        const input = document.getElementById('input-box');
        const btn = document.getElementById('main-btn');
        const display = document.getElementById('display-word');
        const progress = document.getElementById('progress');
        const timeLabel = document.getElementById('timer-text');
        const timerCont = document.getElementById('timer-container');

        function scramble(word) {
            let a = word.toUpperCase().split(''), n = a.length;
            for(let i = n - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a.join('') === word.toUpperCase() ? scramble(word) : a.join('');
        }

        function initGame() {
            sessionWords = names.map(n => ({ original: n, scrambled: scramble(n) })).sort(() => Math.random() - 0.5);
            load();
        }

        function load() {
            if(current >= sessionWords.length) return showEnd();
            isReadyForNext = false;
            display.textContent = sessionWords[current].scrambled;
            input.value = ""; input.disabled = false; input.focus();
            btn.textContent = "Check Answer"; btn.className = "btn";
            document.getElementById('msg').textContent = "";
            timeLeft = 15;
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            updateTimerUI();
            timer = setInterval(() => {
                timeLeft--;
                updateTimerUI();
                if(timeLeft <= 0) { clearInterval(timer); fail("Time's Up!"); }
            }, 1000);
        }

        function updateTimerUI() {
            timeLabel.textContent = timeLeft;
            let offset = 226 - (226 * timeLeft / 15);
            progress.style.strokeDashoffset = offset;
            if(timeLeft <= 5) {
                timerCont.classList.add('low-time');
                progress.style.stroke = "var(--error)";
            } else {
                timerCont.classList.remove('low-time');
                progress.style.stroke = "var(--primary)";
            }
        }

        function check() {
            clearInterval(timer);
            let user = input.value.trim().toLowerCase();
            let correct = sessionWords[current].original.toLowerCase();

            if(user === correct) {
                score++;
                document.getElementById('score').textContent = score;
                document.getElementById('msg').innerHTML = "<span style='color:var(--success)'>✨ Correct!</span>";
            } else {
                fail("Incorrect!");
            }
            finishStep();
        }

        function fail(reason) {
            clearInterval(timer);
            navigator.vibrate?.([100, 50, 100]);
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 400);
            document.getElementById('msg').innerHTML = `<span style='color:var(--error)'>${reason} It was ${sessionWords[current].original}</span>`;
            finishStep();
        }

        function finishStep() {
            isReadyForNext = true;
            input.disabled = true;
            btn.textContent = "Next Name";
            btn.className = "btn btn-next";
        }

        function showEnd() {
            document.getElementById('game-view').style.display = "none";
            document.getElementById('end-view').style.display = "block";
            document.getElementById('final-score').textContent = `You scored ${score} out of ${names.length}`;
        }

        function resetGame() {
            current = 0; score = 0;
            document.getElementById('score').textContent = "0";
            document.getElementById('game-view').style.display = "block";
            document.getElementById('end-view').style.display = "none";
            initGame();
        }

        btn.addEventListener('click', () => isReadyForNext ? (current++, load()) : check());
        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') isReadyForNext ? (current++, load()) : check(); });

        initGame();
    </script>
</body>
</html>
