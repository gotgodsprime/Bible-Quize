<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Scramble Ultra</title>
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --input-bg: #f1f5f9;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #818cf8;
            --primary-hover: #6366f1;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --border: #334155;
            --input-bg: #0f172a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; transition: background-color 0.3s, color 0.3s; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .app-container {
            background: var(--card);
            padding: 30px;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 440px;
            position: relative;
            overflow: hidden;
        }

        /* Views management */
        .view { display: flex; flex-direction: column; }
        .hidden { display: none !important; }

        /* Global UI Elements */
        h1 { font-size: 2rem; font-weight: 800; text-align: center; margin-bottom: 5px; }
        .subtitle { color: var(--text-sub); text-align: center; font-size: 0.9rem; margin-bottom: 25px; }
        
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }
        .btn:active { transform: scale(0.96); }
        .btn-secondary { background: none; border: 2px solid var(--border); color: var(--text-main); box-shadow: none; margin-top: 10px; }
        .btn-next { background: var(--text-main); color: var(--card); }

        /* Dashboard Selectors */
        .section-label { font-size: 0.75rem; font-weight: 800; color: var(--text-sub); text-transform: uppercase; margin: 15px 0 8px; text-align: left; }
        .grid-select { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .cat-grid { grid-template-columns: repeat(2, 1fr); }
        
        .pill-btn {
            padding: 12px 8px;
            border: 2px solid var(--border);
            background: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-main);
        }
        .pill-btn.active { border-color: var(--primary); background: rgba(99, 102, 241, 0.1); color: var(--primary); }

        /* HUD & Gameplay */
        .hud { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: 800; font-size: 0.9rem; }
        .lives { color: var(--error); letter-spacing: 2px; }
        .streak-badge { background: var(--warning); color: white; padding: 4px 12px; border-radius: 99px; font-size: 0.8rem; }
        
        .timer-bar-container { width: 100%; height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 25px; overflow: hidden; }
        .timer-bar { width: 100%; height: 100%; background: var(--primary); transform-origin: left; transition: transform 0.1s linear; }

        .scrambled-box {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 6px;
            color: var(--primary);
            text-align: center;
            margin: 20px 0;
            text-transform: uppercase;
            animation: slideIn 0.3s ease-out;
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: 2px solid var(--border);
            background: var(--input-bg);
            color: var(--text-main);
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            outline: none;
            margin-bottom: 15px;
        }
        input:focus { border-color: var(--primary); background: var(--card); }

        .feedback { text-align: center; font-weight: 700; min-height: 24px; margin-top: 15px; font-size: 1rem; }

        /* Settings Toggle */
        .theme-toggle { position: absolute; top: 20px; left: 20px; cursor: pointer; background: none; border: none; font-size: 1.2rem; }

        /* Stats & Leaderboard Layout */
        .stats-summary { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-node { background: var(--input-bg); padding: 15px; border-radius: 16px; text-align: center; }
        .stat-val { font-size: 1.6rem; font-weight: 800; color: var(--primary); display: block; }
        .stat-lbl { font-size: 0.7rem; color: var(--text-sub); font-weight: 700; text-transform: uppercase; }

        /* Animations */
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .shake { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body data-theme="light">

    <div class="app-container" id="app">
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>

        <!-- 🏠 VIEW: DASHBOARD -->
        <div id="view-dash" class="view">
            <h1>Bible Scramble</h1>
            <p class="subtitle">The Ultimate Interactive Blitz</p>

            <div class="stats-summary">
                <div class="stat-node"><span class="stat-val" id="dash-games">0</span><span class="stat-lbl">Played</span></div>
                <div class="stat-node"><span class="stat-val" id="dash-streak" style="color:var(--warning);">0</span><span class="stat-lbl">Daily Streak</span></div>
            </div>

            <div class="section-label">Select Difficulty</div>
            <div class="grid-select">
                <button class="pill-btn active" data-type="diff" data-val="easy" onclick="setOpt('diff', 'easy', this)">Easy</button>
                <button class="pill-btn" data-type="diff" data-val="medium" onclick="setOpt('diff', 'medium', this)">Medium</button>
                <button class="pill-btn" data-type="diff" data-val="hard" onclick="setOpt('diff', 'hard', this)">Hard</button>
            </div>

            <div class="section-label">Select Category</div>
            <div class="grid-select cat-grid">
                <button class="pill-btn active" data-type="cat" data-val="all" onclick="setOpt('cat', 'all', this)">All Words</button>
                <button class="pill-btn" data-type="cat" data-val="ot" onclick="setOpt('cat', 'ot', this)">Old Testament</button>
                <button class="pill-btn" data-type="cat" data-val="nt" onclick="setOpt('cat', 'nt', this)">New Testament</button>
                <button class="pill-btn" data-type="cat" data-val="women" onclick="setOpt('cat', 'women', this)">Women</button>
            </div>

            <button class="btn" style="margin-top: 30px;" onclick="initGameSession()">Start Campaign</button>
            <button class="btn btn-secondary" onclick="switchView('view-stats')">View History & Stats</button>
        </div>

        <!-- 🎮 VIEW: GAMEPLAY -->
        <div id="view-game" class="view hidden">
            <div class="hud">
                <div>SCORE: <span id="game-score">0</span></div>
                <div id="game-streak-badge" class="streak-badge hidden">🔥 <span id="game-streak-val">0</span></div>
                <div class="lives" id="game-lives">❤️❤️❤️</div>
            </div>

            <div class="timer-bar-container">
                <div class="timer-bar" id="game-timer"></div>
            </div>

            <div class="scrambled-box" id="scrambled-target">----</div>
            <input type="text" id="game-input" placeholder="Solve name..." autocomplete="off">
            <button class="btn" id="game-action-btn" onclick="handleInputSubmission()">Check Answer</button>
            <div class="feedback" id="game-feedback"></div>
        </div>

        <!-- 🏁 VIEW: GAME OVER / REPORT -->
        <div id="view-end" class="view hidden">
            <h1 id="end-title">Game Over</h1>
            <p class="subtitle" id="end-subtitle">Campaign Report Card</p>

            <div class="stats-summary">
                <div class="stat-node"><span class="stat-val" id="end-score">0</span><span class="stat-lbl">Final Score</span></div>
                <div class="stat-node"><span class="stat-val" id="end-bonus" style="color:var(--success);">+0</span><span class="stat-lbl">Speed Bonuses</span></div>
            </div>

            <button class="btn" onclick="switchView('view-dash')">Return Home</button>
        </div>

        <!-- 📊 VIEW: STATS & RECORDS -->
        <div id="view-stats" class="view hidden">
            <h1>Personal Ledger</h1>
            <p class="subtitle">Lifetime tracking data</p>

            <div class="stats-summary" style="grid-template-columns: repeat(2, 1fr);">
                <div class="stat-node"><span class="stat-val" id="stat-accuracy">0%</span><span class="stat-lbl">Accuracy Rate</span></div>
                <div class="stat-node"><span class="stat-val" id="stat-best-streak">0</span><span class="stat-lbl">Top Hit Streak</span></div>
                <div class="stat-node"><span class="stat-val" id="stat-correct">0</span><span class="stat-lbl">Total Correct</span></div>
                <div class="stat-node"><span class="stat-val" id="stat-wrong">0</span><span class="stat-lbl">Total Wrong</span></div>
            </div>

            <button class="btn" onclick="switchView('view-dash')">Back</button>
        </div>
    </div>

    <script>
        // 🧩 BIBLE METADATA DICTIONARY
        const BIBLE_DICTIONARY = {
            easy: {
                all: ["Peter", "Mary", "Ruth", "Noah", "David", "Adam", "Eve", "John", "Mark", "Paul", "Isaac"],
                ot: ["Noah", "David", "Adam", "Eve", "Isaac"],
                nt: ["Peter", "Mary", "John", "Mark", "Paul"],
                women: ["Mary", "Ruth", "Eve"]
            },
            medium: {
                all: ["Elizabeth", "Abraham", "Elijah", "Lazarus", "Gideon", "Samson", "Deborah", "Solomon", "Esther", "Samuel"],
                ot: ["Abraham", "Elijah", "Gideon", "Samson", "Deborah", "Solomon", "Samuel"],
                nt: ["Elizabeth", "Lazarus"],
                women: ["Elizabeth", "Deborah", "Esther"]
            },
            hard: {
                all: ["Nebuchadnezzar", "Melchizedek", "Methuselah", "Hezekiah", "Sennacherib", "Zerubbabel", "Jehoiakim", "Mephibosheth"],
                ot: ["Nebuchadnezzar", "Melchizedek", "Methuselah", "Hezekiah", "Sennacherib", "Zerubbabel", "Jehoiakim", "Mephibosheth"],
                nt: ["Melchizedek"], 
                women: ["Athaliah", "Maacah", "Zipporah"] 
            }
        };

        // ⚙️ GLOBAL STATES & PREFERENCES
        let activeConfig = { diff: 'easy', cat: 'all' };
        let currentSession = { wordPool: [], index: 0, score: 0, speedBonus: 0, streak: 0, lives: 3, timeLeft: 100, isDone: false };
        let localEngineClock = null;

        // 💾 STORAGE STRUCTURE
        let userData = JSON.parse(localStorage.getItem('scramblePro_Data')) || {
            gamesPlayed: 0, totalCorrect: 0, totalWrong: 0, bestStreak: 0, dailyStreak: 0, lastPlayTimestamp: null
        };

        // 🎵 CORE AUDIO ENGINE (Synthesized Real-time Oscillator)
        function playSfx(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'correct') {
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
                    osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1); // E5
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    osc.start(); osc.stop(ctx.currentTime + 0.25);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(180, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    osc.start(); osc.stop(ctx.currentTime + 0.25);
                } else if (type === 'win') {
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime);
                    osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1);
                    osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.2); // G5
                    osc.frequency.setValueAtTime(1046.50, ctx.currentTime + 0.3); // C6
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    osc.start(); osc.stop(ctx.currentTime + 0.5);
                }
            } catch(e) { console.log("Audio contexts blocked or unsupported."); }
        }

        // 📳 HAPTIC FEEDBACK CONTAINER
        function triggerHaptic(ms) {
            if (navigator.vibrate) navigator.vibrate(ms);
        }

        // 🎲 GENERATIVE SHUFFLER
        function scrambleLogic(word) {
            let arr = word.toUpperCase().split(''), i = arr.length;
            while (i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            let out = arr.join('');
            return (out === word.toUpperCase() && word.length > 2) ? scrambleLogic(word) : out;
        }

        // 🌓 APPEARANCE LOGIC
        function toggleTheme() {
            const body = document.body;
            let current = body.getAttribute('data-theme');
            body.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
        }

        function setOpt(type, value, elem) {
            activeConfig[type] = value;
            document.querySelectorAll(`[data-type="${type}"]`).forEach(b => b.classList.remove('active'));
            elem.classList.add('active');
        }

        function switchView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'view-dash') populateDashboardStats();
            if(id === 'view-stats') populateLedgerPage();
        }

        // 📊 STATS COMPILATION ENGINE
        function populateDashboardStats() {
            checkDailyStreak();
            document.getElementById('dash-games').textContent = userData.gamesPlayed;
            document.getElementById('dash-streak').textContent = userData.dailyStreak;
        }

        function populateLedgerPage() {
            const total = userData.totalCorrect + userData.totalWrong;
            const accuracy = total === 0 ? 0 : Math.round((userData.totalCorrect / total) * 100);
            document.getElementById('stat-accuracy').textContent = accuracy + "%";
            document.getElementById('stat-best-streak').textContent = userData.bestStreak;
            document.getElementById('stat-correct').textContent = userData.totalCorrect;
            document.getElementById('stat-wrong').textContent = userData.totalWrong;
        }

        function checkDailyStreak() {
            const now = new Date();
            if (userData.lastPlayTimestamp) {
                const lastPlay = new Date(userData.lastPlayTimestamp);
                const diffTime = Math.abs(now - lastPlay);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                if (diffDays > 1) userData.dailyStreak = 0; // Streak broken
            }
            localStorage.setItem('scramblePro_Data', JSON.stringify(userData));
        }

        // 🎮 GAMEPLAY INFRASTRUCTURE
        function initGameSession() {
            let pool = BIBLE_DICTIONARY[activeConfig.diff][activeConfig.cat];
            if(!pool || pool.length === 0) pool = BIBLE_DICTIONARY[activeConfig.diff]['all']; // Fallback guardrail
            
            // Randomize and populate full session dynamically
            currentSession.wordPool = pool.map(w => ({ original: w, scrambled: scrambleLogic(w) })).sort(() => Math.random() - 0.5);
            currentSession.index = 0;
            currentSession.score = 0;
            currentSession.speedBonus = 0;
            currentSession.streak = 0;
            currentSession.lives = 3;
            currentSession.isDone = false;

            userData.gamesPlayed++;
            userData.lastPlayTimestamp = new Date().getTime();
            localStorage.setItem('scramblePro_Data', JSON.stringify(userData));

            switchView('view-game');
            updateHudUI();
            nextTurn();
        }

        function updateHudUI() {
            document.getElementById('game-score').textContent = currentSession.score;
            document.getElementById('game-lives').textContent = "❤️".repeat(currentSession.lives);
            const badge = document.getElementById('game-streak-badge');
            if (currentSession.streak > 0) {
                badge.classList.remove('hidden');
                document.getElementById('game-streak-val').textContent = currentSession.streak;
            } else {
                badge.classList.add('hidden');
            }
        }

        function nextTurn() {
            if(currentSession.index >= currentSession.wordPool.length || currentSession.lives <= 0) {
                return finishSession();
            }
            currentSession.isDone = false;
            document.getElementById('scrambled-target').textContent = currentSession.wordPool[currentSession.index].scrambled;
            
            const input = document.getElementById('game-input');
            input.value = ""; input.disabled = false; input.focus();
            
            const btn = document.getElementById('game-action-btn');
            btn.textContent = "Check Answer"; btn.className = "btn";
            document.getElementById('game-feedback').textContent = "";
            
            runTimerMechanic();
        }

        function runTimerMechanic() {
            clearInterval(localEngineClock);
            currentSession.timeLeft = 100;
            const bar = document.getElementById('game-timer');
            
            // Speed adjustments per difficulty setting
            let reductionRate = activeConfig.diff === 'easy' ? 0.7 : activeConfig.diff === 'medium' ? 1.2 : 2.0;

            localEngineClock = setInterval(() => {
                currentSession.timeLeft -= reductionRate;
                if(currentSession.timeLeft <= 0) {
                    currentSession.timeLeft = 0;
                    clearInterval(localEngineClock);
                    processWrongSubmission(true); // Flag timeout
                }
                bar.style.transform = `scaleX(${currentSession.timeLeft / 100})`;
            }, 100);
        }

        function handleInputSubmission() {
            if (currentSession.isDone) {
                currentSession.index++;
                nextTurn();
                return;
            }

            clearInterval(localEngineClock);
            const input = document.getElementById('game-input');
            let guess = input.value.trim().toLowerCase();
            let target = currentSession.wordPool[currentSession.index].original.toLowerCase();

            if (guess === target) {
                processCorrectSubmission();
            } else {
                processWrongSubmission(false);
            }
        }

        function processCorrectSubmission() {
            currentSession.isDone = true;
            currentSession.score += 10;
            userData.totalCorrect++;
            currentSession.streak++;
            
            if(currentSession.streak > userData.bestStreak) userData.bestStreak = currentSession.streak;

            // Speed Bonus Calculus
            let bonus = 0;
            if(currentSession.timeLeft > 50) {
                bonus = Math.round((currentSession.timeLeft - 50) / 10);
                currentSession.speedBonus += bonus;
                currentSession.score += bonus;
            }

            playSfx('correct');
            document.getElementById('game-feedback').innerHTML = `<span style="color:var(--success)">✨ Correct! ${bonus > 0 ? '+'+bonus+' Speed Bonus!' : ''}</span>`;
            flagTurnEnded();
        }

        function processWrongSubmission(isTimeout) {
            currentSession.isDone = true;
            currentSession.lives--;
            currentSession.streak = 0;
            userData.totalWrong++;

            triggerHaptic(200);
            playSfx('wrong');
            
            const card = document.getElementById('app');
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 300);

            let txt = isTimeout ? "⏰ Out of Time!" : "❌ Incorrect!";
            document.getElementById('game-feedback').innerHTML = `<span style="color:var(--error)">${txt} It was ${currentSession.wordPool[currentSession.index].original}</span>`;
            
            flagTurnEnded();
        }

        function flagTurnEnded() {
            document.getElementById('game-input').disabled = true;
            updateHudUI();
            const btn = document.getElementById('game-action-btn');
            btn.textContent = "Next Word";
            btn.className = "btn btn-next";
            localStorage.setItem('scramblePro_Data', JSON.stringify(userData));
        }

        function finishSession() {
            clearInterval(localEngineClock);
            
            // Check daily streak advancement validation
            if(currentSession.score > 0) {
                const last = userData.lastPlayTimestamp ? new Date(userData.lastPlayTimestamp).toDateString() : null;
                const today = new Date().toDateString();
                if(last !== today) userData.dailyStreak++;
            }

            localStorage.setItem('scramblePro_Data', JSON.stringify(userData));

            document.getElementById('end-title').textContent = currentSession.lives <= 0 ? "Defeat!" : "Victory!";
            document.getElementById('end-title').style.color = currentSession.lives <= 0 ? "var(--error)" : "var(--success)";
            document.getElementById('end-score').textContent = currentSession.score;
            document.getElementById('end-bonus').textContent = "+" + currentSession.speedBonus;

            if(currentSession.lives > 0) playSfx('win');
            switchView('view-end');
        }

        // Initialize listener hooks for physical keyboards
        document.getElementById('game-input').addEventListener('keypress', e => {
            if(e.key === 'Enter') handleInputSubmission();
        });

        // Dynamic System Check on Boot
        populateDashboardStats();
    </script>
</body>
</html>
